name: CMS Open PR

# When the CMS pushes a commit to the `cms` branch, automatically open
# a PR against `main` (if one isn't already open). The cms-auto-merge
# workflow then approves and merges it once checks pass.

on:
  push:
    branches: [cms]

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open PR if none exists
        run: |
          existing=$(gh pr list --head cms --base main --json number --jq length)
          if [ "$existing" -eq 0 ]; then
            gh pr create \
              --head cms \
              --base main \
              --title "CMS content update" \
              --body "Automated content update from the Sveltia CMS. Will be merged automatically once validation passes."
          else
            echo "PR already open — skipping."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
