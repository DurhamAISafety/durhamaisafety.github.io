name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main, astro-2]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect site
        run: |
          mkdir -p dist
          # Both index.html and 404.html use the same redirect so that
          # any path (e.g. /events) is forwarded to the matching path on .uk
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=https://durhamaisafety.uk">
              <link rel="canonical" href="https://durhamaisafety.uk">
              <script>location.replace("https://durhamaisafety.uk" + location.pathname + location.search)</script>
            </head>
            <body>
              <p>Redirecting to <a href="https://durhamaisafety.uk">durhamaisafety.uk</a>…</p>
            </body>
          </html>
          EOF
          cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
